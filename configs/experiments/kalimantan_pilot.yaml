name: kalimantan_pilot
task: occurrence
data:
  grid:
    grid_km: 10
    bbox:
      lon_min: 108.5
      lon_max: 118.5
      lat_min: -3.5
      lat_max: 3.5
  temporal:
    reference_start: 2019-01-01
    reference_end: 2020-12-31
    reference_stride_days: 7
    lookback_days: 60
    temporal_windows: [3, 7, 14, 30, 60]
    horizon_days: 30
  split:
    buffer_days: 30
    train_end: 2019-12-31
    val_end: 2020-06-30
    test_end: 2020-12-31
  spatial_blocks:
    block_size_km: 50
    n_folds: 5
    seed: 42
  sources:
    - name: era5
      enabled: true
      params: {}
    - name: sentinel2
      enabled: true
      params: {}
    - name: srtm
      enabled: true
      params: {}
    - name: modis_fire
      enabled: true
      params: {}
    - name: modis_burn
      enabled: true
      params: {}
    - name: dynamic_world
      enabled: false
      params: {}
  raw_dir: data/raw
  processed_dir: data/processed
model:
  name: xgboost
  task: classification
  params:
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    random_state: 42
evaluation:
  bootstrap_samples: 200
  confidence_level: 0.95
output_dir: outputs/kalimantan_pilot
